appId: com.buildoto.app
productName: Buildoto
copyright: Copyright © 2026 Buildoto contributors
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - node_modules/**/*
  - package.json
  - '!**/*.map'
  - '!**/{.eslintrc,.prettierrc,tsconfig.json,tsconfig.*.json}'

# Per-platform extraResources because electron-builder's ${os} macro expands
# to `mac`/`win`/`linux`, while scripts/postinstall.ts writes to the Node.js
# platform names `darwin-*`/`win32-*`/`linux-*`. Keep them in sync by hand.
asar: true
asarUnpack:
  - resources/**

# Register `buildoto://` so the OS can hand off OAuth-lite callbacks
# (buildoto://auth?code=…) to the running app. See packages/main/src/index.ts
# for the runtime side (setAsDefaultProtocolClient + open-url + second-instance).
protocols:
  - name: Buildoto deep link
    schemes:
      - buildoto

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # No Apple Developer account → skip code signing entirely.
  # `hardenedRuntime` + entitlements require a signing cert, so we opt out.
  # Gatekeeper will warn on first launch, but the app runs fine after
  # right-click → Open or `xattr -cr /Applications/Buildoto.app`.
  identity: null
  icon: build/icon-1024.png
  extraResources:
    - from: resources/freecad/darwin-${arch}
      to: freecad
      filter:
        - '**/*'
    - from: resources/freecad/runner.py
      to: freecad/runner.py
    - from: resources/freecad/handlers
      to: freecad/handlers
      filter:
        - '**/*.py'

win:
  target:
    - target: nsis
      arch:
        - x64
  # No EV code signing certificate → installer is unsigned.
  # Windows SmartScreen will show a warning, but users can click
  # "More info" → "Run anyway". Open-source projects typically
  # distribute unsigned until they can afford a signing cert.
  certificateSubjectName: null
  certificateSha1: null
  signingHashAlgorithms: null
  icon: build/icon-1024.png
  extraResources:
    - from: resources/freecad/win32-${arch}
      to: freecad
      filter:
        - '**/*'
    - from: resources/freecad/runner.py
      to: freecad/runner.py
    - from: resources/freecad/handlers
      to: freecad/handlers
      filter:
        - '**/*.py'

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  maintainer: Buildoto contributors <hello@buildoto.app>
  icon: build/icons
  extraResources:
    - from: resources/freecad/linux-${arch}
      to: freecad
      filter:
        - '**/*'
    - from: resources/freecad/runner.py
      to: freecad/runner.py
    - from: resources/freecad/handlers
      to: freecad/handlers
      filter:
        - '**/*.py'

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: buildoto
  repo: buildoto
  releaseType: draft
  channel: stable
